name: Lint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      run: curl -LsSf https://astral.sh/uv/0.11.22/install.sh | sh

    - name: running linter
      run: |
        uv run ruff format --check
        uv run ruff check
